name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: Build & Test (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure (Release)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DNANOUSD_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure

  build-and-test-debug:
    name: Build & Test (Ubuntu, Debug)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure (Debug)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DNANOUSD_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure

  address-sanitize-build-and-test:
    name: AddressSanitizer Build and Test (Ubuntu, ${{ matrix.compiler }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: GCC
            cc: gcc
            cxx: g++
          - compiler: Clang
            cc: clang
            cxx: clang++

    steps:
      - uses: actions/checkout@v4

      - name: Install Clang
        if: matrix.compiler == 'Clang'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: >
          cmake -B build-asan-ubsan
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DNANOUSD_BUILD_TESTS=ON
          -DNANOUSD_ENABLE_SANITIZERS=ON

      - name: Build
        run: cmake --build build-asan-ubsan --parallel

      - name: Run tests
        working-directory: build-asan-ubsan
        run: ctest --output-on-failure

  thread-sanitize-build-and-test:
    name: ThreadSanitizer Build and Test (Ubuntu, ${{ matrix.compiler }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: GCC
            cc: gcc
            cxx: g++
          - compiler: Clang
            cc: clang
            cxx: clang++

    steps:
      - uses: actions/checkout@v4

      - name: Install Clang
        if: matrix.compiler == 'Clang'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: >
          cmake -B build-tsan
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DNANOUSD_BUILD_TESTS=ON
          -DNANOUSD_ENABLE_SANITIZERS=ON
          -DNANOUSD_SANITIZERS=thread

      - name: Build
        run: cmake --build build-tsan --parallel

      - name: Run tests
        working-directory: build-tsan
        run: ctest --output-on-failure
